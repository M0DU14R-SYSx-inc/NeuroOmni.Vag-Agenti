name: build-apk

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Generate gradle wrapper
        run: gradle wrapper --gradle-version 8.10.2 --distribution-type bin

      - name: Build Horizons debug APK (nexaEnabled)
        run: ./gradlew :horizons:assembleDebug -PnexaEnabled=true --no-daemon --stacktrace

      - name: Build Watchdog debug APK
        run: ./gradlew :watchdog:assembleDebug --no-daemon --stacktrace

      - name: Upload Horizons APK
        uses: actions/upload-artifact@v4
        with:
          name: horizons-debug-apk
          path: horizons/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload Watchdog APK
        uses: actions/upload-artifact@v4
        with:
          name: watchdog-debug-apk
          path: watchdog/build/outputs/apk/debug/*.apk
          if-no-files-found: error
