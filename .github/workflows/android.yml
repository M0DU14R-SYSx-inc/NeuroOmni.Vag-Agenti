name: Android CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      - name: Build debug APK
        run: gradle assembleDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: NeuroOmni-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

  # Real on-device build: OmniNeural-4B via the Nexa SDK (resolved from Maven
  # Central). No token is baked in — the universal Nexa key is entered in-app and
  # stored encrypted (Architecture §12). Sideload this APK on the Razr to run the
  # model on the Hexagon NPU.
  build-nexa:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      - name: Build Nexa-enabled debug APK
        run: gradle assembleDebug -PnexaEnabled=true --stacktrace

      - name: Upload Nexa APK
        uses: actions/upload-artifact@v4
        with:
          name: NeuroOmni-nexa-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
